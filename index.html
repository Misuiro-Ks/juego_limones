<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapar Limones</title>

    <link rel="stylesheet" href="limones.css">
    <script src="utils.js"></script>
</head>

<body onload="iniciar()">

    <div class="contenedor">

        <div class="titulo">
            <h1>🍋 Atrapar Limones 🍋</h1>
            <p class="descripcion">
                ¡Atrapa todos los limones antes de que caigan al suelo!
            </p>
            <p class="autor">
                Desarrollado por <strong>Fabian Regalado</strong>
            </p>
        </div>

        <div class="panel">

            <div class="marcador">
                <span class="icono">🏆</span>
                <div>
                    <small>PUNTAJE</small>
                    <h2 id="txtPuntaje">0</h2>
                </div>
            </div>

            <div class="marcador">
                <span class="icono">❤️</span>
                <div>
                    <small>VIDAS</small>
                    <h2 id="txtVidas">3</h2>
                </div>
            </div>

        </div>

        <div class="juego">

            <canvas id="areajuego" width="600" height="400"></canvas>

        </div>

        <div class="botones">

            <button onclick="moverIzquierda()">
                ⬅ Izquierda
            </button>

            <button onclick="Reiniciar()">
                🔄 Reiniciar
            </button>

            <button onclick="moverDerecha()">
                Derecha ➡
            </button>

        </div>

    </div>

    <script src="limones.js"></script>

</body>
</html>
